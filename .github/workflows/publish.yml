name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish-money:
    name: Publish GetDue.BuildingBlocks.Money to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore GetDue.BuildingBlocks.sln

      - name: Build solution
        run: dotnet build GetDue.BuildingBlocks.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test (Money)
        run: dotnet test tests/GetDue.BuildingBlocks.Money.Tests/GetDue.BuildingBlocks.Money.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/GetDue.BuildingBlocks.Money/GetDue.BuildingBlocks.Money.csproj -c Release --no-build -o ./artifacts -p:Version=${{ steps.version.outputs.version }}

      - name: Push to GitHub Packages
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source \
            --username getdue-dev \
            --password "$NUGET_AUTH_TOKEN" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/getdue-dev/index.json"
          dotnet nuget push ./artifacts/*.nupkg \
            --source github \
            --api-key "$NUGET_AUTH_TOKEN" \
            --skip-duplicate
          dotnet nuget push ./artifacts/*.snupkg \
            --source github \
            --api-key "$NUGET_AUTH_TOKEN" \
            --skip-duplicate || true
