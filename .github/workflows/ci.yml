name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    uses: getdue-dev/.github/.github/workflows/lint.yml@main
    secrets: inherit
  build:
    uses: getdue-dev/.github/.github/workflows/dotnet-build.yml@main
    with:
      project: "GetDue.BuildingBlocks.sln"
      run-tests: true
    secrets: inherit
  build-money-coverage:
    uses: getdue-dev/.github/.github/workflows/dotnet-build.yml@main
    with:
      project: "tests/GetDue.BuildingBlocks.Money.Tests/GetDue.BuildingBlocks.Money.Tests.csproj"
      collect-coverage: true
      coverage-threshold: 100
    secrets: inherit
